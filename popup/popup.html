<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>PhishGuard</h1>
      <p class="subtitle">Adaptive warning layer for messaging applications</p>

      <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">No API key set</span>
      </div>

      <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input
          type="password"
          id="apiKey"
          placeholder="Enter your Gemini API key"
        />
        <button id="toggleVisibility">Show</button>
      </div>

      <button class="save-btn" id="saveBtn">Save Key</button>
      <button class="clear-btn" id="clearBtn">Clear Key</button>

      <div class="info">
        <p>Get a free API key at <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></p>
        <p>Your key is stored locally and never shared.</p>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
